[project]
site_name = "FairShip Documentation"
site_description = "Official documentation for the FairShip simulation framework"
site_author = "SHiP Collaboration"

repo_url = "https://github.com/ShipSoft/FairShip"
repo_name = "ShipSoft/FairShip"

nav = [
  { "Home" = "index.md" },
  { "Installation" = "installation.md" },
  { "Samples" = "samples.md" },
  { "Running FairShip" = "running.md" },
  { "Configuration" = "configuration.md" },
  { "Development" = "development.md" },
  { "FAQ" = "faq.md" },
]

[project.theme]
variant = "classic"
logo = "https://ship.web.cern.ch/sites/default/files/SHIP_logo.png"
favicon = "https://ship.web.cern.ch/sites/default/files/favicon.ico"
language = "en"

features = [
    "content.code.copy",
    "navigation.expand",
    "navigation.instant",
    "navigation.sections",
    "navigation.tabs",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/ShipSoft/FairShip"

[project.markdown_extensions.admonition]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.tables]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.superfences]
