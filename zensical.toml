[project]
site_name = "SHiP Software"
site_description = "Documentation for the SHiP experiment software"
site_author = "SHiP Collaboration"
site_url = "https://shipsoft.github.io/Documentation/"

nav = [
  { "Home" = "index.md" },
  { "FairShip" = [
    { "Overview" = "fairship/index.md" },
    { "Installation" = "fairship/installation.md" },
    { "Samples" = "fairship/samples.md" },
    { "Running" = "fairship/running.md" },
    { "Configuration" = "fairship/configuration.md" },
    { "Development" = "fairship/development.md" },
    { "FAQ" = "fairship/faq.md" },
  ] },
  { "Simulation" = [
    { "Overview" = "simulation/index.md" },
    { "Installation" = "simulation/installation.md" },
    { "Samples" = "simulation/samples.md" },
    { "Running" = "simulation/running.md" },
    { "Development" = "simulation/development.md" },
    { "FAQ" = "simulation/faq.md" },
  ] },
  { "Geometry" = "geometry/index.md" },
  { "Geometry Service" = "geometry_service/index.md" },
  { "Field Service" = "field_service/index.md" },
  { "Data Model" = "data-model/index.md" },
  { "Developer Guide" = [
    { "Overview" = "dev-guide/index.md" },
    { "Linting & git hooks" = "dev-guide/linting-and-hooks.md" },
    { "Multi-package development" = "dev-guide/multi-package.md" },
    { "Testing dependency PRs" = "dev-guide/testing-dependency-prs.md" },
    { "Troubleshooting" = "dev-guide/troubleshooting.md" },
    { "pixi-build gap log" = "dev-guide/pixi-build-gaps.md" },
  ] },
  { "Packaging" = [
    { "Overview" = "packaging/index.md" },
    { "Add a recipe" = "packaging/add-a-recipe.md" },
    { "Bump a version" = "packaging/bump-a-version.md" },
    { "CI and secrets" = "packaging/ci-and-secrets.md" },
  ] },
  { "shipdist" = "shipdist/index.md" },
  { "cvmfs_release" = "cvmfs-release/index.md" },
  { "HTCondor" = "htcondor/index.md" },
]

[project.theme]
variant = "classic"
logo = "https://ship.web.cern.ch/wp-content/uploads/2025/07/SHiP-Symbol_White_logo_webpage-1.png"
favicon = "https://ship.web.cern.ch/wp-content/uploads/2025/08/115x115.png"
language = "en"

features = [
    "content.code.copy",
    "navigation.expand",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.indexes",
    "navigation.sections",
    "navigation.tabs",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/ShipSoft"

[project.markdown_extensions.admonition]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.tables]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.superfences]
